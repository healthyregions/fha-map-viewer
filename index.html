<!DOCTYPE html>
<html lang="en">
<head>
    <title>FHA Block Data Maps</title>
    <meta property="og:description" content="Basic viewer and access to georeferenced FHA Block Data maps." />
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.7.1/dist/maplibre-gl.css' />
    <script src='https://unpkg.com/maplibre-gl@5.7.1/dist/maplibre-gl.js'></script>
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mini.css/3.0.1/mini-default.min.css"> -->
     <link rel="stylesheet" href="https://unpkg.com/normalize.css@8.0.1/normalize.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 0; padding: 0; }
        html, body, #map { height: 100%; }
        select {margin: 0; max-width: 100%;}
        #dialog-btn {background: none; color: blue;}
        #showPanelBtn {display: none; position: absolute; z-index: 2000;}
        #panel {display: flex; flex-direction: column;}
        .control-box {background: lightcoral; padding: 1em;}
    </style>
</head>
<body>
<div style="display:flex; height:100vh">
    <button id="showPanelBtn" onclick="togglePanel()">show panel &rarr;</button>
    <div id="panel" style="display: flex; min-width:300px; max-width:300px; background:lightgrey;">
        <button onclick="togglePanel()">&larr; hide panel</button>
        <h1 id="map-title">FHA Block Data Maps</h1>
        <button id="dialog-btn" command="show-modal" commandfor="my-dialog">About this project</button>

        <div class="control-box">
            <p>Show map:</p>
            <select id="cityselect"></select>
            <p>Transparency:</p>
            <input id="transparency-slider" type="range" min="0" max="100" step="0" value="100" />
        </div>
    </div>
    <div id="map" style="width:100%;"></div>

    <dialog id="my-dialog">
        <p>More about the project here.</p>
        <button commandfor="my-dialog" command="close">Close</button>
    </dialog>
</div>
<script>
    let items;
    fetch('./fha-map-data.json')
        .then((response) => response.json())
        .then((json) => {
            items = json.items;
            items.sort(function(a, b) {
                return a.title.localeCompare(b.title);
            });
        });
    const map = new maplibregl.Map({
        container: 'map', // container id
        style: 'https://tiles.openfreemap.org/styles/liberty',
        bounds: [
            -81.6558837890625,
            40.98819156349393,
            -81.41418457031251,
            41.16624933909198
        ]
    });
    const setMap = function (mapid) {
        const mapDef = mapLookup[mapid]
        map.fitBounds(mapDef.bounds,{linear:true})
        if (map.getStyle().layers.map(a => a.id).includes("overlay")){map.removeLayer("overlay")}
        map.addLayer({
            'id': "overlay",
            'type': 'raster',
            'source': mapid,
        })

        const slider = document.getElementById("transparency-slider");
        slider.value = 100;
        slider.addEventListener('input', function (e) {
            map.setPaintProperty(
                "overlay",
                "raster-opacity",
                parseInt(slider.value, 10) / 100,
            )
        })
    }
    const mapLookup = {}

    function togglePanel() {
        console.log("asdf")
        const panelEl = document.getElementById("panel");
        console.log(panelEl.style.display)

        const showPanelBtn = document.getElementById("showPanelBtn");
        if (panelEl.style.display == "flex") {
            panelEl.style.display = "none";
            showPanelBtn.style.display = "block";
            
        } else {
            console.log('ok????')
            panelEl.style.display = "flex";
            showPanelBtn.style.display = "none";
        }
    }

    map.on('load', () => {
        const list = document.getElementById("citylist");
        const selectList =  document.getElementById("cityselect")

        items.forEach(element => {
            element.type = "raster";
            map.addSource(element.id, element)
            mapLookup[element.id] = element

            const selectOpt = document.createElement('option')
            selectOpt.innerHTML = element.title;
            selectOpt.value = element.id;
            selectList.appendChild(selectOpt)
        });
        selectList.addEventListener("change", (e) => {
            setMap(e.target.value)
        })

        setMap(items[0].id)
    });
</script>
</body>
</html>
